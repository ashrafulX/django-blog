<article class="bg-white border border-gray-100 rounded overflow-hidden shadow-sm hover:shadow-md transition">
    {% if post.featured_image %}
    <a href="{% url 'blog:detail' slug=post.slug %}" class="block overflow-hidden h-48">
        <img src="{{ post.featured_image.url }}" alt="{{ post.title }}" class="w-full h-full object-cover hover:scale-105 transition duration-300">
    </a>
    {% endif %}
    <div class="p-4">
        <a href="{% url 'blog:category' slug=post.category.slug %}" class="text-red-600 font-semibold text-xs uppercase mb-2 block">
            {{ post.category.name }}
        </a>
        <h3 class="font-bold text-lg leading-tight mb-2 hover:text-red-600 transition">
            <a href="{% url 'blog:detail' slug=post.slug %}">{{ post.title|truncatewords:10 }}</a>
        </h3>
        <p class="text-gray-600 text-sm mb-3">
            {{ post.short_description|truncatechars:90 }}
        </p>
        <div class="flex justify-between items-center text-xs text-gray-500 font-medium">
            <span>{{ post.author_name }}</span>
            <span>{{ post.published_at|date:"M d" }}</span>
        </div>
    </div>
</article>
